# ---------------------------------------------------------------------------
# good-morning-brief 个人每日简报配置
# 三个板块：论文 / 科技新闻 / 基金涨跌，每天一封邮件送到你的信箱。
# ---------------------------------------------------------------------------

brief:
  title: "Claire 的每日简报"
  language: zh-CN
  timezone: "Asia/Shanghai"

# ------------------------- 板块 1：论文 -------------------------
papers:
  enabled: true
  # 每天精选几篇
  pick_top_n: 3
  # 检索时间窗（天）与每源抓取上限
  days_back: 14
  max_results_per_source: 40
  # arXiv RSS 订阅类目（最稳的取数方式，几乎不限流）。
  # 核心类目（语音/音频/信号）默认即视为相关；其余类目仅保留命中关键词的。
  paper_categories:
    - cs.SD
    - eess.AS
    - eess.SP
    - cs.AI
    - cs.CL
    - cs.LG
  core_categories:
    - cs.SD
    - eess.AS
    - eess.SP
  # 你关注的核心方向（命中即高分）
  focus_topics:
    - multi-channel speech enhancement
    - microphone-array speech enhancement
    - neural beamforming
    - MVDR beamforming
    - speech separation
    - target speaker extraction
  # 你也想跟的前沿方向（加分项，跟进就业/趋势）
  frontier_topics:
    - large language model agent
    - retrieval augmented generation
    - efficient LLM inference
    - multimodal foundation model
    - reinforcement learning
    - embodied AI
  # 高优先级会议/期刊（命中加分）
  venues_high_priority:
    - ICASSP
    - Interspeech
    - IEEE TASLP
    - NeurIPS
    - ICML
    - ICLR
    - ACL
  ranking_weights:
    keyword_match: 0.40
    frontier_bonus: 0.20
    venue_priority: 0.15
    recency: 0.25

# ------------------------- 板块 2：科技新闻 -------------------------
news:
  enabled: true
  # 每天展示几条（中文科技新闻，主源 IT之家 RSS，兜底 V2EX 热帖）
  top_n: 6

# ------------------------- 板块 3：基金 -------------------------
funds:
  enabled: true
  # 你的持仓（天天基金代码）
  #   benchmark：跟踪指数名称（仅用于加仓建议的文案，如“对应纳斯达克100近期…”）
  #   fx：true 表示 QDII，加仓建议会额外参考 USD/CNY 汇率（best-effort）
  holdings:
    - code: "019172"
      alias: "摩根纳斯达克100人民币A"
      benchmark: "纳斯达克100"
      fx: true
    - code: "022436"
      alias: "摩根中证A500ETF联接A"
      benchmark: "中证A500"
      fx: false
  # 简单加仓提示：单日跌幅超过该百分比时提示“可关注定投/加仓”
  dip_alert_pct: 1.0
  # 新机会：与现有持仓互补、可关注配置的基金（不纳入持仓，仅展示+轻量建议）
  #   reason：一句话互补理由（为什么值得配，跟现有持仓怎么搭）
  #   benchmark / fx：可选，同 holdings（仅用于分析文案，机会基金可不填）
  opportunities:
    - code: "000216"
      alias: "华安黄金易ETF联接A"
      benchmark: "黄金/COMEX黄金"
      reason: "与股债低相关，地缘风险下避险压舱，给组合加一层保险"
    - code: "007466"
      alias: "华泰柏瑞中证红利低波ETF联接A"
      benchmark: "中证红利低波"
      reason: "高股息+低波动，提供稳定现金流，与科技成长风格互补"
    - code: "003547"
      alias: "鹏华丰禄债券"
      reason: "纯债中低风险，组合稳健底仓，平滑权益波动"
